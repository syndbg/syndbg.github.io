<meta name="google-site-verification" content="1IcXoz4emdlOVec6WBm8ILkUqjYLOYVj-Jb5FcL7n60" />

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title | jsonify }},
  "description": {{ with .Description }}{{ . | jsonify }}{{ else }}{{ .Summary | jsonify }}{{ end }},
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "url": {{ .Permalink | jsonify }},
  "author": {
    "@type": "Person",
    "name": {{ site.Params.author.name | default "Anton Antonov" | jsonify }},
    "url": {{ .Site.BaseURL | jsonify }}
  }{{ with .Params.tags }},
  "keywords": {{ . | jsonify }}{{ end }}
}
</script>
{{ end }}
