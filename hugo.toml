baseURL = 'https://syndbg.github.io/'
languageCode = 'en-us'
title = "Anton Antonov's mindspace"
paginate = 10

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[author]
  name = "Anton Antonov"
  email = "anton.synd.antonov@gmail.com"

[params]
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  enableMermaid = true

  [params.profileMode]
    enabled = true
    title = "Anton Antonov"
    subtitle = "Engineering Manager & Principal Software Engineer. Writing about Go, Kubernetes, platform engineering, and distributed systems."
    imageUrl = "images/avatar.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "Anton Antonov"
    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/syndbg"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/syndbg"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[outputFormats.plain]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    style = "github-dark"
    codeFences = true
    guessSyntax = true

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 20
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 30

[services]
  [services.googleAnalytics]
    id = 'G-Q5WK831V5N'
